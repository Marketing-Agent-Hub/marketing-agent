name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build and Deploy Docker Images"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/opt/oc-news-bot
            
            # Pull images mới từ GHCR
            docker compose pull server web
            
            # Stop containers cũ
            docker compose stop server web
            
            # Remove containers cũ (giữ volumes)
            docker compose rm -f server web
            
            # Start containers mới với image vừa pull
            docker compose up -d server web
            
            # Đợi containers khởi động
            sleep 5
            
            # Show status
            docker compose ps
            
            echo "✅ Deployment completed!"
