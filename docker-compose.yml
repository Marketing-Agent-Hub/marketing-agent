services:
  postgres:
    image: postgres:16
    container_name: rss_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: m1505
      POSTGRES_DB: rss_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rss_network

  server:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/ocnewsbot-server:${IMAGE_TAG:-latest}
    container_name: rss_server
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:m1505@postgres:5432/rss_bot
      NODE_ENV: production
      PORT: 3001
      # Thêm các biến môi trường khác từ .env
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - rss_network
    volumes:
      - ./server/logs:/app/logs

  web:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME}/ocnewsbot-web:${IMAGE_TAG:-latest}
    container_name: rss_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - rss_network
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

networks:
  rss_network:
    driver: bridge
