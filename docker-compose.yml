services:
  postgres:
    image: postgres:16
    container_name: marketing_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: m1505
      POSTGRES_DB: marketing_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketing_agent_network

  server:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${GITHUB_USERNAME}/marketing-agent-server:${IMAGE_TAG:-latest}
    container_name: marketing_agent_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:m1505@postgres:5432/marketing_agent
      NODE_ENV: production
      PORT: 3001
      # Thêm các biến môi trường khác từ .env
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - marketing_agent_network
    volumes:
      - ./server/logs:/app/logs

  web:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${GITHUB_USERNAME}/marketing-agent-web:${IMAGE_TAG:-latest}
    container_name: marketing_agent_web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - marketing_agent_network
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

networks:
  marketing_agent_network:
    driver: bridge
